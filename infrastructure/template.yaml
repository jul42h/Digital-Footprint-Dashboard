AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Digital Footprint CVE Dashboard - FastAPI + Lambda + DynamoDB + Athena

Globals:
  Function:
    Runtime: python3.12
    Timeout: 60
    MemorySize: 512
    Architectures:
      - x86_64

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
  CorsOrigin:
    Type: String
    Default: "*"

Resources:
  DashboardTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub cve-dashboard-data-${EnvironmentName}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE

  RawDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  CuratedDataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub cve_dashboard_${EnvironmentName}
        Description: Curated Shodan/CVE data for Athena analytics

  DataAccessFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub cve-dashboard-data-access-${EnvironmentName}
      CodeUri: ../lambdas/data_access/
      Handler: handler.handler
      Description: DynamoDB + Athena queries for dashboard data
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref DashboardTable
          ATHENA_DATABASE: !Sub cve_dashboard_${EnvironmentName}
          ATHENA_WORKGROUP: primary
          ATHENA_OUTPUT_BUCKET: !Sub s3://${AthenaResultsBucket}/
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DashboardTable
        - S3ReadPolicy:
            BucketName: !Ref CuratedDataBucket
        - Statement:
            - Effect: Allow
              Action:
                - athena:StartQueryExecution
                - athena:GetQueryExecution
                - athena:GetQueryResults
                - glue:GetDatabase
                - glue:GetTable
              Resource: "*"

  IngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub cve-dashboard-ingest-${EnvironmentName}
      CodeUri: ../lambdas/ingest/
      Handler: handler.handler
      Description: S3 trigger to ingest Shodan exports
      Environment:
        Variables:
          DATA_ACCESS_LAMBDA: !Ref DataAccessFunction
          CURATED_BUCKET: !Ref CuratedDataBucket
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref RawDataBucket
        - S3WritePolicy:
            BucketName: !Ref CuratedDataBucket
        - LambdaInvokePolicy:
            FunctionName: !Ref DataAccessFunction
      Events:
        S3Upload:
          Type: S3
          Properties:
            Bucket: !Ref RawDataBucket
            Events: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: ingest/

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub cve-dashboard-api-${EnvironmentName}
      CodeUri: ../backend/
      Handler: app.main.handler
      Description: FastAPI dashboard API (Mangum)
      Environment:
        Variables:
          ENVIRONMENT: aws
          DATA_ACCESS_LAMBDA_NAME: !Ref DataAccessFunction
          DYNAMODB_TABLE_NAME: !Ref DashboardTable
          ATHENA_DATABASE: !Sub cve_dashboard_${EnvironmentName}
          ATHENA_OUTPUT_BUCKET: !Sub s3://${AthenaResultsBucket}/
          CORS_ORIGINS: !Ref CorsOrigin
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref DataAccessFunction
      Events:
        ApiGateway:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com
  DashboardTableName:
    Value: !Ref DashboardTable
  RawDataBucketName:
    Value: !Ref RawDataBucket
  CuratedDataBucketName:
    Value: !Ref CuratedDataBucket
  DataAccessLambdaArn:
    Value: !GetAtt DataAccessFunction.Arn
